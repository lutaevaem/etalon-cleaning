<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Эталон">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f5b13"/>
      <stop offset="18%" stop-color="#d4af37"/>
      <stop offset="34%" stop-color="#fff1a8"/>
      <stop offset="48%" stop-color="#b8860b"/>
      <stop offset="62%" stop-color="#d4af37"/>
      <stop offset="78%" stop-color="#fff7c8"/>
      <stop offset="100%" stop-color="#8a6415"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="52%" stop-color="#ffffff" stop-opacity=".75"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animate attributeName="x1" values="-1;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#2f211b" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="18" fill="#f2f0ec"/>
  <circle cx="32" cy="32" r="23" fill="#2f211b"/>
  <circle cx="32" cy="32" r="18" fill="url(#gold)" filter="url(#softShadow)"/>
  <circle cx="32" cy="32" r="18" fill="url(#shine)" opacity=".55"/>
  <path d="M22 35c8-1 14-6 18-16 3 11 0 19-8 25-4-2-8-5-10-9Z" fill="#fffdf8" opacity=".96"/>
  <path d="M22 35c8-1 14-6 18-16 3 11 0 19-8 25-4-2-8-5-10-9Z" fill="none" stroke="#2f211b" stroke-opacity=".18" stroke-width="1"/>
</svg>
